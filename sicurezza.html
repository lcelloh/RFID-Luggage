<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sicurezza</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 font-sans p-8">
<div class="max-w-3xl mx-auto bg-white rounded-xl shadow p-8">
    <h1 class="text-2xl font-bold text-orange-600 mb-1 border-b pb-4">Ispezione Bagaglio</h1>
    <p class="text-xs text-slate-400 font-mono mb-6">
        32 bit — aggiorna solo W0[7:6]=pipeline e W0[5:3]=flag sicurezza
    </p>

    <div id="loading" class="text-center py-12 text-gray-400">Lettura tag in corso...</div>

    <div id="content" class="hidden grid grid-cols-2 gap-8">
        <!-- Dati passeggero -->
        <div class="bg-slate-50 rounded-lg border p-6 space-y-3 text-sm">
            <h3 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Dati Passeggero</h3>
            <p class="text-gray-500">Volo:       <span id="outVolo"  class="font-bold text-gray-900 font-mono ml-2"></span></p>
            <p class="text-gray-500">Passeggero: <span id="outNome"  class="font-bold text-gray-900 ml-2"></span></p>
            <p class="text-gray-500">Telefono:   <span id="outTel"   class="font-bold text-gray-900 font-mono ml-2"></span></p>
            <p class="text-gray-500">Operatore:  <span id="outOp"    class="font-bold text-gray-900 ml-2"></span></p>
            <hr>
            <p class="text-gray-500 text-xs">
                Pipeline: <span id="outPipeline" class="font-bold ml-1 font-mono"></span>
            </p>
            <p class="text-gray-500 text-xs font-mono">
                Raw: <span id="outHex" class="text-slate-800"></span>
                &nbsp;|&nbsp;
                Bin: <span id="outBin" class="text-slate-800"></span>
            </p>
        </div>

        <!-- Aggiorna sicurezza -->
        <div class="bg-orange-50 rounded-lg border border-orange-200 p-6">
            <h3 class="font-bold text-orange-800 uppercase text-xs tracking-wider mb-4">
                Aggiorna Ispezione
            </h3>
            <div class="space-y-4">
                <label class="flex items-center gap-3">
                    <input type="checkbox" id="chkEseguito" class="w-5 h-5 text-orange-600">
                    <div>
                        <p class="font-bold">Controllo Eseguito</p>
                        <p class="text-xs text-gray-500">W0[7:6] pipeline → 10 (sicurezza)</p>
                    </div>
                </label>
                <label class="flex items-center gap-3">
                    <input type="checkbox" id="chkSuperato" class="w-5 h-5 text-orange-600">
                    <div>
                        <p class="font-bold">Esito Superato</p>
                        <p class="text-xs text-gray-500">W0[5] sec_ok → 1</p>
                    </div>
                </label>
                <button id="btnSalva"
                    class="w-full bg-orange-600 text-white font-bold py-3 rounded hover:bg-orange-700 mt-4">
                    AGGIORNA TAG
                </button>
                <p class="text-xs text-orange-700 text-center">
                    Modifica solo bit pipeline e sec_ok. PaxID e volo rimangono intatti.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
const PIPELINE_LABELS = ['—', 'Check-in', 'Sicurezza OK', 'Smistato'];

let raw = { tagHex:'00000000', decoded:{}, lookup:{voli:[],operatori:[],passeggeri:{}} };

function poll() {
    fetch('http://localhost:8080/tag-data')
        .then(r => r.json())
        .then(data => {
            if (!data.ready) { setTimeout(poll, 400); return; }
            raw = data;
            render();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        })
        .catch(() => setTimeout(poll, 500));
}

function render() {
    const d  = raw.decoded;
    const lk = raw.lookup;
    const volo = lk.voli?.[d.volo_idx]    ?? `IDX${d.volo_idx}`;
    const op   = lk.operatori?.[d.idop_idx] ?? `IDX${d.idop_idx}`;
    const pax  = lk.passeggeri?.[String(d.pax_id)] ?? {};

    document.getElementById('outVolo').textContent     = volo;
    document.getElementById('outNome').textContent     = pax.nome || '— (PaxID: '+d.pax_id+')';
    document.getElementById('outTel').textContent      = pax.tel  || '—';
    document.getElementById('outOp').textContent       = op;
    document.getElementById('outPipeline').textContent = PIPELINE_LABELS[d.pipeline] ?? d.pipeline;
    document.getElementById('outHex').textContent      = raw.tagHex;
    const w0 = parseInt(raw.tagHex.substring(0,4),16);
    document.getElementById('outBin').textContent      = w0.toString(2).padStart(16,'0') + ' ' +
        parseInt(raw.tagHex.substring(4,8),16).toString(2).padStart(16,'0');

    // Pre-popola checkbox
    document.getElementById('chkEseguito').checked = d.pipeline >= 2;
    document.getElementById('chkSuperato').checked = d.sec_ok;
}

document.getElementById('btnSalva').addEventListener('click', () => {
    const d = raw.decoded;
    const eseguito = document.getElementById('chkEseguito').checked;
    const superato = document.getElementById('chkSuperato').checked;

    // Ricalcola W0 modificando solo pipeline (bit7:6) e sec_ok (bit5)
    const newPipeline = eseguito ? 2 : d.pipeline;  // 2 = sicurezza
    const newSecOk    = superato ? 1 : 0;

    let w0 = ((d.volo_idx & 0xF) << 12) |
             ((d.idop_idx & 0xF) << 8)  |
             ((newPipeline & 0x3) << 6) |
             (newSecOk << 5)             |
             ((d.aer_ok ? 1 : 0) << 4)  |
             ((d.nst_ok ? 1 : 0) << 3);

    const w0h = w0.toString(16).padStart(4,'0').toUpperCase();
    const w1h = raw.tagHex.substring(4,8);  // paxID invariato
    const updatedHex = w0h + w1h;

    fetch('http://localhost:8080', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hexPayload: updatedHex })
    }).then(r => r.ok ? alert('Tag aggiornato!\n'+updatedHex) : alert('Errore HTTP '+r.status));
});

window.addEventListener('DOMContentLoaded', poll);
</script>
</body>
</html>
